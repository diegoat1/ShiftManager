<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftManager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="bg-slate-50 min-h-screen">
<div x-data="{ get page() { return $store.app.page }, sidebarOpen: false }">

    <!-- ==================== LOGIN PAGE ==================== -->
    <template x-if="page === 'login' || page === 'register'">
        <div x-data="loginPage()" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-800 to-slate-900 p-4">
            <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
                <div class="text-center mb-6">
                    <h1 class="text-2xl font-bold text-slate-800">ShiftManager</h1>
                    <p class="text-sm text-slate-500 mt-1" x-text="isRegister ? 'Registrazione Medico' : 'Accesso al Sistema'"></p>
                </div>
                <div x-show="error" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600" x-text="error"></div>
                <form @submit.prevent="isRegister ? register() : login()" class="space-y-4">
                    <template x-if="isRegister">
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-3">
                                <input x-model="firstName" type="text" placeholder="Nome" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <input x-model="lastName" type="text" placeholder="Cognome" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <input x-model="fiscalCode" type="text" placeholder="Codice Fiscale" required maxlength="16" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <input x-model="phone" type="tel" placeholder="Telefono (opzionale)" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </template>
                    <input x-model="email" type="email" placeholder="Email" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input x-model="password" type="password" placeholder="Password" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit" :disabled="loading"
                            class="w-full py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50 transition-colors"
                            x-text="loading ? 'Attendere...' : (isRegister ? 'Registrati' : 'Accedi')"></button>
                </form>
                <p class="text-center text-sm text-slate-500 mt-4">
                    <button @click="toggleMode()" class="text-blue-600 hover:underline"
                            x-text="isRegister ? 'Hai un account? Accedi' : 'Non hai un account? Registrati'"></button>
                </p>
            </div>
        </div>
    </template>

    <!-- ==================== MAIN APP (requires auth) ==================== -->
    <template x-if="page !== 'login' && page !== 'register'">
        <div>

    <!-- Mobile top bar -->
    <div class="lg:hidden fixed top-0 left-0 right-0 h-14 bg-slate-800 text-white flex items-center px-4 z-30">
        <button @click="sidebarOpen = !sidebarOpen" class="p-1">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
        <span class="ml-3 text-lg font-semibold">ShiftManager</span>
        <!-- Notification bell (mobile) -->
        <div class="ml-auto relative" x-data="notificationsDropdown()">
            <button @click="toggle()" class="relative p-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                <span x-show="$store.app.unreadNotifications > 0" class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center" x-text="$store.app.unreadNotifications"></span>
            </button>
        </div>
    </div>

    <!-- Sidebar overlay (mobile) -->
    <div x-show="sidebarOpen" @click="sidebarOpen = false"
         class="lg:hidden fixed inset-0 bg-black/50 z-30" x-transition.opacity></div>

    <!-- Sidebar -->
    <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
           class="sidebar fixed left-0 top-0 h-full w-60 z-40 lg:translate-x-0 transition-transform duration-200 flex flex-col">
        <div class="p-5 border-b border-slate-700">
            <h1 class="text-xl font-bold text-white">ShiftManager</h1>
            <p class="text-xs text-slate-400 mt-1">Gestione Turni Medici</p>
        </div>
        <nav class="flex-1 p-3 space-y-1">
            <a href="#/" @click="sidebarOpen = false"
               :class="page === 'dashboard' ? 'active' : 'hover:bg-slate-700'"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Dashboard
            </a>
            <!-- Admin nav -->
            <template x-if="$store.app.isAdmin()">
                <div class="space-y-1">
                    <a href="#/medici" @click="sidebarOpen = false"
                       :class="page === 'medici' ? 'active' : 'hover:bg-slate-700'"
                       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        Medici
                    </a>
                    <a href="#/strutture" @click="sidebarOpen = false"
                       :class="page === 'strutture' ? 'active' : 'hover:bg-slate-700'"
                       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                        Strutture
                    </a>
                    <a href="#/calendario" @click="sidebarOpen = false"
                       :class="page === 'calendario' ? 'active' : 'hover:bg-slate-700'"
                       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        Calendario
                    </a>
                    <a href="#/admin/documenti" @click="sidebarOpen = false"
                       :class="page === 'admin-documenti' ? 'active' : 'hover:bg-slate-700'"
                       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        Documenti
                    </a>
                    <a href="#/analytics" @click="sidebarOpen = false"
                       :class="page === 'analytics' ? 'active' : 'hover:bg-slate-700'"
                       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                        Analytics
                    </a>
                </div>
            </template>
            <!-- Doctor nav -->
            <template x-if="$store.app.isMedico()">
                <div class="space-y-1">
                    <a href="#/profilo" @click="sidebarOpen = false"
                       :class="page === 'profilo' ? 'active' : 'hover:bg-slate-700'"
                       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        Profilo
                    </a>
                    <a href="#/documenti" @click="sidebarOpen = false"
                       :class="page === 'documenti' ? 'active' : 'hover:bg-slate-700'"
                       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        Documenti
                    </a>
                    <a href="#/mie-offerte" @click="sidebarOpen = false"
                       :class="page === 'mie-offerte' ? 'active' : 'hover:bg-slate-700'"
                       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        Offerte
                    </a>
                </div>
            </template>
        </nav>
        <!-- User info + logout -->
        <div class="p-3 border-t border-slate-700">
            <div class="flex items-center justify-between">
                <div class="text-xs text-slate-400 truncate" x-text="$store.app.user?.email || ''"></div>
                <button @click="$store.app.logout()" class="text-xs text-red-400 hover:text-red-300 ml-2">Esci</button>
            </div>
            <div class="text-xs text-slate-500 mt-1">v0.2.0</div>
        </div>
    </aside>

    <!-- Main content -->
    <main class="lg:ml-60 pt-14 lg:pt-0 min-h-screen">
        <div class="p-4 lg:p-6 max-w-7xl mx-auto">

            <!-- ==================== DASHBOARD ==================== -->
            <template x-if="page === 'dashboard'">
                <div x-data="dashboardPage">
                    <h2 class="text-2xl font-bold text-slate-800 mb-6">Dashboard</h2>

                    <div x-show="loading" class="flex justify-center py-12"><div class="spinner"></div></div>

                    <div x-show="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                        <div class="stat-card bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                            <div class="text-sm text-slate-500 mb-1">Medici Attivi</div>
                            <div class="text-3xl font-bold text-blue-600" x-text="stats.doctors"></div>
                        </div>
                        <div class="stat-card bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                            <div class="text-sm text-slate-500 mb-1">Istituzioni</div>
                            <div class="text-3xl font-bold text-teal-600" x-text="stats.institutions"></div>
                        </div>
                        <div class="stat-card bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                            <div class="text-sm text-slate-500 mb-1">Turni del Mese</div>
                            <div class="text-3xl font-bold text-slate-800" x-text="stats.shiftsThisMonth"></div>
                        </div>
                        <div class="stat-card bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                            <div class="text-sm text-slate-500 mb-1">Turni da Assegnare</div>
                            <div class="text-3xl font-bold text-amber-500" x-text="stats.unassigned"></div>
                        </div>
                    </div>

                    <!-- Incomplete shifts table -->
                    <div x-show="!loading && incompleteShifts.length > 0" class="mb-6">
                        <h3 class="text-lg font-semibold text-slate-800 mb-3">Turni da Completare</h3>
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="data-table w-full text-sm">
                                    <thead class="bg-slate-50 border-b border-slate-200">
                                        <tr>
                                            <th class="text-left px-4 py-3 font-medium text-slate-600">Sede</th>
                                            <th class="text-left px-4 py-3 font-medium text-slate-600">Data</th>
                                            <th class="text-left px-4 py-3 font-medium text-slate-600 hidden sm:table-cell">Tipo</th>
                                            <th class="text-left px-4 py-3 font-medium text-slate-600">Stato</th>
                                            <th class="text-left px-4 py-3 font-medium text-slate-600">Medici</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="s in incompleteShifts" :key="s.id">
                                            <tr class="border-b border-slate-100">
                                                <td class="px-4 py-3 font-medium" x-text="s.site_name"></td>
                                                <td class="px-4 py-3 text-slate-600" x-text="new Date(s.start_datetime).toLocaleDateString('it-IT')"></td>
                                                <td class="px-4 py-3 text-slate-600 hidden sm:table-cell" x-text="s.shift_type || 'Standard'"></td>
                                                <td class="px-4 py-3">
                                                    <span class="badge"
                                                          :class="{'badge-blue': s.status === 'open', 'badge-yellow': s.status === 'partially_filled', 'badge-gray': s.status === 'draft'}"
                                                          x-text="s.status === 'open' ? 'Aperto' : s.status === 'partially_filled' ? 'Parziale' : 'Bozza'"></span>
                                                </td>
                                                <td class="px-4 py-3 text-slate-600" x-text="(s.assigned || 0) + ' / ' + s.required_doctors"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div x-show="!loading" class="flex gap-3">
                        <a href="#/medici" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">Vai a Medici</a>
                        <a href="#/calendario" class="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm font-medium hover:bg-teal-700 transition-colors">Vai al Calendario</a>
                    </div>
                </div>
            </template>

            <!-- ==================== MEDICI ==================== -->
            <template x-if="page === 'medici'">
                <div x-data="doctorsPage">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                        <h2 class="text-2xl font-bold text-slate-800">Medici</h2>
                        <div class="flex items-center gap-2">
                            <button @click="doctorModalOpen = true"
                                    class="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">
                                + Medico
                            </button>
                            <input type="text" x-model="search" placeholder="Cerca per nome, codice fiscale..."
                                   class="px-3 py-2 border border-slate-300 rounded-lg text-sm w-full sm:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>

                    <div x-show="loading" class="flex justify-center py-12"><div class="spinner"></div></div>

                    <div x-show="!loading" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="data-table w-full text-sm">
                                <thead class="bg-slate-50 border-b border-slate-200">
                                    <tr>
                                        <th class="text-left px-4 py-3 font-medium text-slate-600">Nome</th>
                                        <th class="text-left px-4 py-3 font-medium text-slate-600">Codice Fiscale</th>
                                        <th class="text-left px-4 py-3 font-medium text-slate-600 hidden sm:table-cell">Email</th>
                                        <th class="text-left px-4 py-3 font-medium text-slate-600">Stato</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="doc in filtered" :key="doc.id">
                                        <tr @click="selectDoctor(doc.id)"
                                            :class="selectedDoctor?.id === doc.id ? 'active' : ''"
                                            class="border-b border-slate-100 cursor-pointer">
                                            <td class="px-4 py-3 font-medium" x-text="doc.last_name + ' ' + doc.first_name"></td>
                                            <td class="px-4 py-3 text-slate-600 font-mono text-xs" x-text="doc.fiscal_code"></td>
                                            <td class="px-4 py-3 text-slate-600 hidden sm:table-cell" x-text="doc.email"></td>
                                            <td class="px-4 py-3">
                                                <span :class="doc.is_active ? 'badge-green' : 'badge-red'" class="badge"
                                                      x-text="doc.is_active ? 'Attivo' : 'Inattivo'"></span>
                                            </td>
                                        </tr>
                                    </template>
                                    <tr x-show="filtered.length === 0">
                                        <td colspan="4" class="px-4 py-8 text-center text-slate-400">Nessun medico trovato</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- Pagination -->
                        <div class="flex items-center justify-between px-4 py-3 border-t border-slate-200 bg-slate-50">
                            <span class="text-sm text-slate-600">
                                Pagina <span x-text="currentPage"></span> di <span x-text="totalPages"></span>
                                (<span x-text="total"></span> totali)
                            </span>
                            <div class="flex gap-2">
                                <button @click="prevPage()" :disabled="skip === 0"
                                        class="px-3 py-1.5 text-sm border rounded-lg disabled:opacity-40 hover:bg-slate-100">Prec</button>
                                <button @click="nextPage()" :disabled="skip + limit >= total"
                                        class="px-3 py-1.5 text-sm border rounded-lg disabled:opacity-40 hover:bg-slate-100">Succ</button>
                            </div>
                        </div>
                    </div>

                    <!-- Doctor detail panel -->
                    <template x-if="selectedDoctor">
                        <div class="mt-4 bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                            <div class="flex items-center justify-between mb-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-sm"
                                         x-text="(selectedDoctor.first_name?.[0] || '') + (selectedDoctor.last_name?.[0] || '')"></div>
                                    <div>
                                        <h3 class="text-lg font-semibold text-slate-800" x-text="selectedDoctor.first_name + ' ' + selectedDoctor.last_name"></h3>
                                        <span class="text-xs text-slate-500 font-mono" x-text="selectedDoctor.fiscal_code"></span>
                                    </div>
                                </div>
                                <button @click="closeDetail()" class="text-slate-400 hover:text-slate-600">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                </button>
                            </div>

                            <div x-show="detailLoading" class="flex justify-center py-6"><div class="spinner"></div></div>

                            <div x-show="!detailLoading">
                                <!-- Tabs -->
                                <div class="flex gap-1 border-b border-slate-200 mb-4">
                                    <button @click="detailTab = 'info'" :class="detailTab === 'info' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'" class="px-3 py-2 text-sm font-medium border-b-2 -mb-px">Informazioni</button>
                                    <button @click="detailTab = 'availability'" :class="detailTab === 'availability' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'" class="px-3 py-2 text-sm font-medium border-b-2 -mb-px">Disponibilita</button>
                                    <button @click="detailTab = 'assignments'" :class="detailTab === 'assignments' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'" class="px-3 py-2 text-sm font-medium border-b-2 -mb-px">Turni (<span x-text="assignments.length"></span>)</button>
                                    <button @click="detailTab = 'documents'" :class="detailTab === 'documents' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'" class="px-3 py-2 text-sm font-medium border-b-2 -mb-px">Documenti (<span x-text="documents.length"></span>)</button>
                                </div>

                                <!-- Tab: Info -->
                                <div x-show="detailTab === 'info'" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div>
                                        <h4 class="text-sm font-medium text-slate-500 mb-2">Dati Personali</h4>
                                        <dl class="space-y-1.5 text-sm">
                                            <div class="flex justify-between"><dt class="text-slate-500">Email:</dt><dd x-text="selectedDoctor.email"></dd></div>
                                            <div class="flex justify-between"><dt class="text-slate-500">Telefono:</dt><dd x-text="selectedDoctor.phone || 'N/D'"></dd></div>
                                            <div class="flex justify-between"><dt class="text-slate-500">Data nascita:</dt><dd x-text="selectedDoctor.birth_date ? fmtDate(selectedDoctor.birth_date) : 'N/D'"></dd></div>
                                            <div class="flex justify-between"><dt class="text-slate-500">Residenza:</dt><dd x-text="selectedDoctor.residence_address || 'N/D'"></dd></div>

                                </div>
                            </div>
                        </div>

                </div>

            <!-- ==================== CALENDARIO ==================== -->

                                        <template x-for="site in (inst.sites || [])" :key="site.id">

                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-blue-600 inline-block"></span> Aperto</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-gray-400 inline-block"></span> Bozza</span>

                    <!-- Assignment Modal -->
                    <template x-if="modalOpen">

                            <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[85vh] overflow-y-auto" @click.stop>

                                    <button @click="closeModal()" class="text-slate-400 hover:text-slate-600">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                    </button>
                                </div>

                                <div x-show="modalLoading" class="flex justify-center py-8"><div class="spinner"></div></div>

                                <div x-show="!modalLoading && modalShift" class="p-5 space-y-5">

                                    <div class="grid grid-cols-2 gap-3 text-sm">

                                        <div><span class="text-slate-500">Paga:</span> <span class="ml-1 font-medium" x-text="fmtPay(modalShift?.base_pay)"></span></div>
                                        <div><span class="text-slate-500">Medici:</span> <span class="ml-1" x-text="modalShift?.required_doctors"></span></div>

                                            <span class="text-slate-500">Stato:</span>
                                            <span class="ml-1 badge"

                                                        <span class="font-mono text-xs" x-text="a.doctor_id.substring(0,8) + '...'"></span>
                                                        <div class="flex items-center gap-2">
                                                            <span class="badge badge-green" x-text="a.status"></span>
                                                            <button @click="removeAssignment(a.id)"
                                                                    class="text-red-500 hover:text-red-700 text-xs font-medium">Rimuovi</button>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                        <template x-if="modalAssignments.length === 0">
                                            <p class="text-sm text-slate-400">Nessuna assegnazione</p>
                                        </template>
                                    </div>

                                    <!-- Eligible doctors (scored) -->
                                    <div>
                                        <h4 class="text-sm font-semibold text-slate-700 mb-2">Medici Eleggibili</h4>
                                        <template x-if="modalEligible.filter(d => d.eligibility.is_eligible).length > 0">
                                            <div class="space-y-2.5 max-h-64 overflow-y-auto">
                                                <template x-for="doc in modalEligible.filter(d => d.eligibility.is_eligible)" :key="doc.doctor_id">
                                                    <div class="bg-slate-50 p-3 rounded-lg text-sm border border-slate-100">
                                                        <!-- Row 1: Rank + Name + Score + Assign -->
                                                        <div class="flex items-center justify-between mb-1.5">
                                                            <div class="flex items-center gap-2">
                                                                <span class="inline-flex items-center justify-center w-6 h-6 rounded-full text-xs font-bold text-white"
                                                                      :class="doc.rank <= 3 ? 'bg-blue-600' : 'bg-slate-400'"

                                                                <span class="font-semibold text-slate-800" x-text="doc.last_name + ' ' + doc.first_name"></span>
                                                            </div>
                                                            <div class="flex items-center gap-2">
                                                                <!-- Score bar -->
                                                                <div class="relative group cursor-help">
                                                                    <div class="flex items-center gap-1.5">
                                                                        <div class="w-16 h-2 bg-slate-200 rounded-full overflow-hidden">
                                                                            <div class="h-full rounded-full transition-all"
                                                                                 :class="doc.score >= 75 ? 'bg-emerald-500' : doc.score >= 50 ? 'bg-yellow-500' : doc.score >= 25 ? 'bg-orange-500' : 'bg-red-500'"
                                                                                 :style="'width:' + doc.score + '%'"></div>
                                                                        </div>
                                                                        <span class="text-xs font-bold tabular-nums"
                                                                              :class="doc.score >= 75 ? 'text-emerald-600' : doc.score >= 50 ? 'text-yellow-600' : doc.score >= 25 ? 'text-orange-600' : 'text-red-600'"
                                                                              x-text="doc.score"></span>
                                                                    </div>
                                                                    <!-- Breakdown tooltip -->
                                                                    <div x-show="doc.breakdown" class="hidden group-hover:block absolute right-0 top-6 z-50 bg-slate-800 text-white text-xs rounded-lg p-3 w-52 shadow-xl">
                                                                        <div class="font-semibold mb-1.5 text-slate-200">Punteggio</div>
                                                                        <div class="space-y-1">
                                                                            <div class="flex justify-between"><span>Disponibilita</span><span class="font-mono" x-text="doc.breakdown?.availability + '/25'"></span></div>
                                                                            <div class="flex justify-between"><span>Preferenza turno</span><span class="font-mono" x-text="doc.breakdown?.shift_preference + '/15'"></span></div>
                                                                            <div class="flex justify-between"><span>Affinita sede</span><span class="font-mono" x-text="doc.breakdown?.site_affinity + '/20'"></span></div>
                                                                            <div class="flex justify-between"><span>Carico lavoro</span><span class="font-mono" x-text="doc.breakdown?.workload_balance + '/15'"></span></div>
                                                                            <div class="flex justify-between"><span>Distanza</span><span class="font-mono" x-text="doc.breakdown?.distance + '/15'"></span></div>
                                                                            <div class="flex justify-between"><span>Qualifiche extra</span><span class="font-mono" x-text="doc.breakdown?.extra_qualifications + '/10'"></span></div>
                                                                            <div class="border-t border-slate-600 mt-1.5 pt-1.5 flex justify-between font-bold"><span>Totale</span><span class="font-mono" x-text="doc.score + '/100'"></span></div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                                <button @click="assignDoctor(doc.doctor_id)" :disabled="assigning"
                                                                        class="px-3 py-1 bg-blue-600 text-white rounded text-xs font-medium hover:bg-blue-700 disabled:opacity-50">
                                                                    Assegna
                                                                </button>
                                                            </div>
                                                        </div>
                                                        <!-- Row 2: Competency tags -->
                                                        <div class="flex flex-wrap gap-1 mb-1">
                                                            <template x-for="cert in doc.certifications" :key="cert">
                                                                <span class="inline-block px-1.5 py-0.5 bg-blue-100 text-blue-700 rounded text-[10px] font-medium" x-text="cert"></span>
                                                            </template>
                                                            <template x-for="lang in doc.languages" :key="lang">
                                                                <span class="inline-block px-1.5 py-0.5 bg-purple-100 text-purple-700 rounded text-[10px] font-medium" x-text="lang"></span>
                                                            </template>
                                                            <template x-if="doc.can_work_alone">
                                                                <span class="inline-block px-1.5 py-0.5 bg-emerald-100 text-emerald-700 rounded text-[10px] font-medium">Autonomo</span>
                                                            </template>
                                                            <template x-if="doc.can_emergency_vehicle">
                                                                <span class="inline-block px-1.5 py-0.5 bg-red-100 text-red-700 rounded text-[10px] font-medium">Emergenza</span>
                                                            </template>
                                                            <template x-if="doc.years_experience > 0">
                                                                <span class="inline-block px-1.5 py-0.5 bg-slate-200 text-slate-600 rounded text-[10px] font-medium" x-text="doc.years_experience + ' anni'"></span>
                                                            </template>
                                                            <template x-if="doc.distance_km !== null">
                                                                <span class="inline-block px-1.5 py-0.5 bg-slate-200 text-slate-600 rounded text-[10px] font-medium" x-text="doc.distance_km + ' km'"></span>
                                                            </template>
                                                        </div>
                                                        <!-- Row 3: Warnings -->
                                                        <template x-if="doc.eligibility.warnings?.length > 0">
                                                            <div class="text-xs text-amber-600 mt-1">
                                                                <template x-for="w in doc.eligibility.warnings">
                                                                    <span x-text="w" class="block"></span>
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                        <template x-if="modalEligible.filter(d => d.eligibility.is_eligible).length === 0">
                                            <p class="text-sm text-slate-400">Nessun medico eleggibile</p>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- ==================== PROFILO MEDICO ==================== -->
            <template x-if="page === 'profilo'">
                <div x-data="profilePage()">
                    <h2 class="text-2xl font-bold text-slate-800 mb-6">Il Mio Profilo</h2>
                    <div x-show="loading" class="flex justify-center py-12"><div class="spinner"></div></div>
                    <div x-show="message" class="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg text-sm text-blue-600" x-text="message"></div>
                    <template x-if="!loading && profile">
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                            <div class="mb-4 flex items-center gap-3">
                                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-xl font-bold"
                                     x-text="(profile.first_name?.[0] || '') + (profile.last_name?.[0] || '')"></div>
                                <div>
                                    <div class="font-semibold text-lg" x-text="profile.first_name + ' ' + profile.last_name"></div>
                                    <div class="text-sm text-slate-500" x-text="profile.email"></div>
                                    <div class="mt-1">
                                        <div class="w-40 bg-slate-200 rounded-full h-2"><div class="bg-blue-600 rounded-full h-2" :style="'width:' + profile.profile_completion_percent + '%'"></div></div>
                                        <span class="text-xs text-slate-500" x-text="profile.profile_completion_percent + '% completo'"></span>
                                    </div>
                                </div>
                            </div>
                            <form @submit.prevent="save()" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label class="block text-sm font-medium text-slate-600 mb-1">Nome</label><input x-model="profile.first_name" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                                <div><label class="block text-sm font-medium text-slate-600 mb-1">Cognome</label><input x-model="profile.last_name" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                                <div><label class="block text-sm font-medium text-slate-600 mb-1">Telefono</label><input x-model="profile.phone" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                                <div><label class="block text-sm font-medium text-slate-600 mb-1">Data di Nascita</label><input x-model="profile.birth_date" type="date" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                                <div class="md:col-span-2"><label class="block text-sm font-medium text-slate-600 mb-1">Indirizzo Residenza</label><input x-model="profile.residence_address" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                                <div><label class="block text-sm font-medium text-slate-600 mb-1">Citta Domicilio</label><input x-model="profile.domicile_city" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                                <div><label class="block text-sm font-medium text-slate-600 mb-1">Provincia Ordine</label><input x-model="profile.ordine_province" maxlength="2" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                                <div><label class="block text-sm font-medium text-slate-600 mb-1">Numero Ordine</label><input x-model="profile.ordine_number" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                                <div><label class="block text-sm font-medium text-slate-600 mb-1">Max Distanza (km)</label><input x-model.number="profile.max_distance_km" type="number" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                                <div class="flex items-center gap-4 md:col-span-2">
                                    <label class="flex items-center gap-2 text-sm"><input x-model="profile.has_own_vehicle" type="checkbox"> Veicolo proprio</label>
                                    <label class="flex items-center gap-2 text-sm"><input x-model="profile.willing_to_relocate" type="checkbox"> Disponibile a trasferirsi</label>
                                    <label class="flex items-center gap-2 text-sm"><input x-model="profile.willing_overnight_stay" type="checkbox"> Disponibile per notti</label>
                                </div>
                                <div class="md:col-span-2">
                                    <button type="submit" :disabled="saving" class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50" x-text="saving ? 'Salvataggio...' : 'Salva Profilo'"></button>
                                </div>
                            </form>
                        </div>
                    </template>
                </div>
            </template>

            <!-- ==================== DOCUMENTI MEDICO ==================== -->
            <template x-if="page === 'documenti'">
                <div x-data="documentsPage()">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-slate-800">I Miei Documenti</h2>
                        <button @click="showUpload = true" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">+ Carica</button>
                    </div>
                    <div x-show="message" class="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg text-sm text-blue-600" x-text="message"></div>
                    <div x-show="loading" class="flex justify-center py-12"><div class="spinner"></div></div>
                    <!-- Upload form -->
                    <template x-if="showUpload">
                        <div class="mb-6 bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                            <h3 class="font-semibold mb-3">Carica Documento</h3>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                                <select x-model="uploadTypeId" class="px-3 py-2 border rounded-lg text-sm" required>
                                    <option value="">Tipo documento...</option>
                                    <template x-for="t in documentTypes" :key="t.id">
                                        <option :value="t.id" x-text="t.name"></option>
                                    </template>
                                </select>
                                <input x-model="uploadIssuedAt" type="date" placeholder="Data emissione" class="px-3 py-2 border rounded-lg text-sm">
                                <input x-model="uploadExpiresAt" type="date" placeholder="Data scadenza" class="px-3 py-2 border rounded-lg text-sm">
                            </div>
                            <input type="file" @change="upload($event)" accept=".pdf,.jpg,.jpeg,.png" :disabled="!uploadTypeId || uploading" class="text-sm">
                            <button @click="showUpload = false" class="ml-3 text-sm text-slate-500 hover:text-slate-700">Annulla</button>
                        </div>
                    </template>
                    <!-- Documents list -->
                    <div x-show="!loading" class="space-y-3">
                        <template x-for="doc in documents" :key="doc.id">
                            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex items-center justify-between">
                                <div>
                                    <div class="font-medium text-sm" x-text="doc.document_type?.name || 'Documento'"></div>
                                    <div class="text-xs text-slate-500" x-text="doc.original_filename + ' - ' + (doc.file_size_bytes / 1024).toFixed(0) + 'KB'"></div>
                                    <div x-show="doc.expires_at" class="text-xs text-slate-400" x-text="'Scade: ' + doc.expires_at"></div>
                                    <div x-show="doc.rejection_reason" class="text-xs text-red-500 mt-1" x-text="'Motivo: ' + doc.rejection_reason"></div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span :class="statusColor(doc.verification_status)" class="badge" x-text="statusLabel(doc.verification_status)"></span>
                                    <button x-show="doc.verification_status === 'pending'" @click="deleteDoc(doc.id)" class="text-red-400 hover:text-red-600 text-xs">Elimina</button>
                                </div>
                            </div>
                        </template>
                        <div x-show="documents.length === 0" class="text-center py-8 text-slate-400">Nessun documento caricato</div>
                    </div>
                </div>
            </template>

            <!-- ==================== OFFERTE MEDICO ==================== -->
            <template x-if="page === 'mie-offerte'">
                <div x-data="myOffersPage()">
                    <h2 class="text-2xl font-bold text-slate-800 mb-6">Le Mie Offerte</h2>
                    <div x-show="message" class="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg text-sm text-blue-600" x-text="message"></div>
                    <div x-show="loading" class="flex justify-center py-12"><div class="spinner"></div></div>
                    <div x-show="!loading" class="flex gap-2 mb-4">

                                <div class="flex items-center justify-between mb-2">
                                    <div>
                                        <span class="font-medium text-sm" x-text="offer.site_name || 'Turno'"></span>
                                        <span class="text-sm text-slate-500 ml-2" x-text="offer.shift_date"></span>
                                    </div>
                                    <span :class="statusColor(offer.status)" class="badge" x-text="statusLabel(offer.status)"></span>
                                </div>
                                <div x-show="offer.expires_at && (offer.status === 'proposed' || offer.status === 'viewed')" class="text-xs text-amber-600 mb-2" x-text="'Scade tra: ' + timeLeft(offer.expires_at)"></div>
                                <div x-show="offer.status === 'proposed' || offer.status === 'viewed'" class="flex gap-2">
                                    <button @click="accept(offer.id)" class="px-4 py-1.5 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700">Accetta</button>
                                    <button @click="reject(offer.id)" class="px-4 py-1.5 bg-red-100 text-red-600 rounded-lg text-sm hover:bg-red-200">Rifiuta</button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- ==================== ADMIN DOCUMENTI ==================== -->
            <template x-if="page === 'admin-documenti'">
                <div x-data="adminDocumentsPage()">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-slate-800">Gestione Documenti</h2>
                        <select x-model="filterStatus" @change="loadDocuments()" class="px-3 py-2 border rounded-lg text-sm">
                            <option value="">Tutti gli stati</option>
                            <option value="pending">In attesa</option>
                            <option value="approved">Approvati</option>
                            <option value="rejected">Rifiutati</option>
                        </select>
                    </div>
                    <div x-show="message" class="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg text-sm text-blue-600" x-text="message"></div>
                    <div x-show="loading" class="flex justify-center py-12"><div class="spinner"></div></div>
                    <div x-show="!loading" class="space-y-3">
                        <template x-for="doc in documents" :key="doc.id">
                            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex items-center justify-between">
                                <div>
                                    <div class="font-medium text-sm" x-text="(doc.doctor?.first_name || '') + ' ' + (doc.doctor?.last_name || '') + ' - ' + (doc.document_type?.name || 'Doc')"></div>
                                    <div class="text-xs text-slate-500" x-text="doc.original_filename"></div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span :class="statusColor(doc.verification_status)" class="badge" x-text="statusLabel(doc.verification_status)"></span>
                                    <template x-if="doc.verification_status === 'pending'">
                                        <div class="flex gap-1">
                                            <button @click="approve(doc.id)" class="px-3 py-1 bg-green-600 text-white rounded text-xs hover:bg-green-700">Approva</button>
                                            <button @click="openReject(doc.id)" class="px-3 py-1 bg-red-100 text-red-600 rounded text-xs hover:bg-red-200">Rifiuta</button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                    <!-- Reject modal -->
                    <template x-if="showRejectModal">
                        <div class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4" @click.self="showRejectModal = false">
                            <div class="bg-white rounded-xl shadow-xl w-full max-w-sm p-6">
                                <h3 class="font-semibold mb-3">Motivo del Rifiuto</h3>
                                <textarea x-model="rejectReason" rows="3" class="w-full px-3 py-2 border rounded-lg text-sm mb-3" placeholder="Specificare il motivo..."></textarea>
                                <div class="flex gap-2">
                                    <button @click="confirmReject()" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm">Conferma</button>
                                    <button @click="showRejectModal = false" class="px-4 py-2 bg-slate-100 rounded-lg text-sm">Annulla</button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- ==================== ANALYTICS ==================== -->
            <template x-if="page === 'analytics'">
                <div x-data="analyticsPage()">
                    <h2 class="text-2xl font-bold text-slate-800 mb-6">Analytics</h2>
                    <div x-show="message" class="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg text-sm text-blue-600" x-text="message"></div>
                    <div x-show="loading" class="flex justify-center py-12"><div class="spinner"></div></div>
                    <template x-if="!loading && kpis">
                        <div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                                <div class="bg-white rounded-xl p-5 shadow-sm border"><div class="text-sm text-slate-500 mb-1">Copertura Turni</div><div class="text-3xl font-bold text-green-600" x-text="kpis.coverage_percent + '%'"></div></div>
                                <div class="bg-white rounded-xl p-5 shadow-sm border"><div class="text-sm text-slate-500 mb-1">Offerte Inviate</div><div class="text-3xl font-bold text-blue-600" x-text="kpis.total_offers_sent"></div></div>
                                <div class="bg-white rounded-xl p-5 shadow-sm border"><div class="text-sm text-slate-500 mb-1">Tasso Accettazione</div><div class="text-3xl font-bold text-teal-600" x-text="kpis.acceptance_rate + '%'"></div></div>
                                <div class="bg-white rounded-xl p-5 shadow-sm border"><div class="text-sm text-slate-500 mb-1">Medici Attivi</div><div class="text-3xl font-bold text-slate-800" x-text="kpis.active_doctors"></div></div>
                            </div>
                            <div class="flex gap-3 mb-6">
                                <button @click="recalculate()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Ricalcola Reliability</button>
                            </div>
                            <!-- Monthly table -->
                            <div class="bg-white rounded-xl shadow-sm border overflow-hidden mb-6">
                                <table class="data-table w-full text-sm">
                                    <thead class="bg-slate-50 border-b"><tr>
                                        <th class="text-left px-4 py-3 font-medium text-slate-600">Mese</th>
                                        <th class="text-left px-4 py-3 font-medium text-slate-600">Turni</th>
                                        <th class="text-left px-4 py-3 font-medium text-slate-600">Coperti</th>
                                        <th class="text-left px-4 py-3 font-medium text-slate-600">Copertura %</th>
                                    </tr></thead>
                                    <tbody>
                                        <template x-for="m in monthlyKpis" :key="m.month">
                                            <tr class="border-b border-slate-100">
                                                <td class="px-4 py-3" x-text="m.month"></td>
                                                <td class="px-4 py-3" x-text="m.total_shifts"></td>
                                                <td class="px-4 py-3" x-text="m.covered_shifts"></td>
                                                <td class="px-4 py-3" x-text="m.coverage_percent + '%'"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

        </div>
    </main>

        </div>
    </template>
</div>

<script src="/static/js/app.js"></script>

<script src="/static/js/pages/my_offers.js"></script>
<script src="/static/js/pages/offers.js"></script>
<script src="/static/js/pages/notifications.js"></script>
<script src="/static/js/pages/analytics.js"></script>
<script src="/static/js/pages/dashboard.js"></script>
<script src="/static/js/pages/doctors.js"></script>
<script src="/static/js/pages/institutions.js"></script>

</body>
